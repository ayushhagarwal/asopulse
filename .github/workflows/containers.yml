name: Container scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: containers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: container-${{ matrix.image }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            file: Dockerfile
            target: api
          - image: worker
            file: Dockerfile
            target: worker
          - image: web
            file: apps/web/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          load: true
          tags: asopulse-${{ matrix.image }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: asopulse-${{ matrix.image }}:scan
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: sarif
          output-file: results.sarif
      - name: Upload scan result
        if: always() && github.event.repository.private == false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@641a925cfafe92d0fdf8b239ba4053e3f8d99d6d # v3
        with:
          sarif_file: results.sarif
