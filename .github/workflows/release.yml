name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer tag, for example v0.1.0 or v0.1.0-rc.1
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  validate:
    name: validate-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
      stable: ${{ steps.version.outputs.stable }}
      major: ${{ steps.version.outputs.major }}
      minor: ${{ steps.version.outputs.minor }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
      - name: Validate version and main
        id: version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]] || { echo "Invalid SemVer tag" >&2; exit 1; }
          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag already exists" >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
          core="${VERSION#v}"
          core="${core%%-*}"
          IFS=. read -r major minor _ <<< "$core"
          {
            echo "version=$VERSION"
            echo "major=v$major"
            echo "minor=v$major.$minor"
            [[ "$VERSION" == *-* ]] && echo "stable=false" || echo "stable=true"
          } >> "$GITHUB_OUTPUT"
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.8.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm audit --audit-level=high
      - run: pnpm licensecheck

  publish-images:
    name: publish-${{ matrix.image }}
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            file: Dockerfile
            target: api
          - image: worker
            file: Dockerfile
            target: worker
          - image: web
            file: apps/web/Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image tags
        id: tags
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/asopulse-${{ matrix.image }}
          VERSION: ${{ needs.validate.outputs.version }}
          STABLE: ${{ needs.validate.outputs.stable }}
          MAJOR: ${{ needs.validate.outputs.major }}
          MINOR: ${{ needs.validate.outputs.minor }}
        run: |
          {
            echo 'tags<<EOF'
            echo "$IMAGE:$VERSION"
            echo "$IMAGE:sha-${GITHUB_SHA::12}"
            if [[ "$STABLE" == "true" ]]; then
              echo "$IMAGE:$MINOR"
              echo "$IMAGE:$MAJOR"
              echo "$IMAGE:latest"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Build and publish
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/asopulse-${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  publish-release:
    name: publish-github-release
    needs: [validate, publish-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
      - name: Create annotated tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "$VERSION" -m "ASOpulse $VERSION"
          git push origin "$VERSION"
      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          name: ASOpulse ${{ needs.validate.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.stable != 'true' }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ needs.validate.outputs.version }}/CHANGELOG.md) and the [self-hosting upgrade guide](https://github.com/${{ github.repository }}/blob/${{ needs.validate.outputs.version }}/docs/self-hosting.md).

            Published images: `asopulse-api`, `asopulse-worker`, and `asopulse-web` on `ghcr.io/${{ github.repository_owner }}`.
