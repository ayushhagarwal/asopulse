services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: asopulse
      POSTGRES_USER: asopulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL", "pg_isready -U asopulse"], interval: 5s, timeout: 3s, retries: 10 }
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes: ["redis-data:/data"]
    healthcheck: { test: ["CMD", "redis-cli", "ping"], interval: 5s, timeout: 3s, retries: 10 }
  api:
    image: ghcr.io/ayushhagarwal/asopulse-api:${ASOPULSE_VERSION:?Set ASOPULSE_VERSION}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://asopulse:${POSTGRES_PASSWORD}@postgres:5432/asopulse
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET}
      WEB_ORIGIN: ${WEB_ORIGIN:?Set WEB_ORIGIN}
      NODE_ENV: production
      API_DOCS_ENABLED: ${API_DOCS_ENABLED:-false}
      PORT: 4100
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:4100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
  worker:
    image: ghcr.io/ayushhagarwal/asopulse-worker:${ASOPULSE_VERSION:?Set ASOPULSE_VERSION}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://asopulse:${POSTGRES_PASSWORD}@postgres:5432/asopulse
      REDIS_URL: redis://redis:6379
    depends_on:
      api: { condition: service_healthy }
  web:
    image: ghcr.io/ayushhagarwal/asopulse-web:${ASOPULSE_VERSION:?Set ASOPULSE_VERSION}
    restart: unless-stopped
    ports: ["127.0.0.1:8080:8080"]
    depends_on:
      api: { condition: service_healthy }

volumes:
  postgres-data:
  redis-data:
